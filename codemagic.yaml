workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Generate android platform files
        script: |
          flutter create . --platforms=android
      - name: Add internet permission
        script: |
          awk '/<manifest/{print; print "    <uses-permission android:name=\"android.permission.INTERNET\"/>"; next}1' android/app/src/main/AndroidManifest.xml > /tmp/manifest_tmp.xml
          mv /tmp/manifest_tmp.xml android/app/src/main/AndroidManifest.xml
      - name: Build APK (Release)
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
